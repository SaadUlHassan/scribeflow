services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432" # host 5433 to avoid clashing with a local Postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  api:
    build: ./api
    environment:
      API_KEY: ${API_KEY}
      PORT: ${PORT}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB}
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      AUDIO_DIR: ${AUDIO_DIR}
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - audio_data:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./worker
    stop_grace_period: 60s # graceful shutdown waits for the in-flight job
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      WHISPER_MODEL: ${WHISPER_MODEL}
      CHUNK_THRESHOLD_SEC: ${CHUNK_THRESHOLD_SEC}
      CHUNK_SEC: ${CHUNK_SEC}
    volumes:
      - audio_data:/data/audio
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  web:
    build: ./web
    environment:
      API_URL: http://api:3000
      API_KEY: ${API_KEY}
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  pg_data:
  audio_data:
